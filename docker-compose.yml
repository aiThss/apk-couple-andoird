services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-couple_snap}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-couple_snap_password}
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 8080
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-couple_snap}:${MONGO_ROOT_PASSWORD:-couple_snap_password}@mongo:27017/couple_snap?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      UPLOAD_DIR: /app/uploads
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@couplesnap.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-now}
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      MAIL_FROM: "${MAIL_FROM:-Couple Snap <no-reply@couplesnap.local>}"
    volumes:
      - api-uploads:/app/uploads
    expose:
      - "8080"

  admin:
    build:
      context: ./admin
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"

volumes:
  mongo-data:
  api-uploads:
